  responses:
    ActionQueued:
      description: The action was accepted and queued for dispatch.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ActionQueued"
          example:
            status: queued
            action: boot
    Unauthorized:
      description: Missing or invalid API key.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error:
              type: unauthorized
              message: Invalid or missing API key
    Forbidden:
      description: The key does not have the required scope or role.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error:
              type: insufficient_scope
              message: This API key does not have the 'write' scope
    NotFound:
      description: The resource does not exist or is not visible to this key.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error:
              type: not_found
              message: Resource not found
    UnprocessableContent:
      description: The request was well-formed but validation failed (e.g. invalid ISO file, invalid parameter, or failed record validation).
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error:
              type: unprocessable
              message: Validation failed
    PaymentRequired:
      description: A payment method must be on file before provisioning a server.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error:
              type: payment_method_required
              message: A payment method is required to provision a server
    RateLimited:
      description: Request rate limit exceeded.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error:
              type: rate_limited
              message: Rate limit exceeded
    DispatchFailed:
      description: |
        The action could not be dispatched to the underlying host. The
        API server is healthy; retry after a short delay.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error:
              type: dispatch_failed
              message: Failed to dispatch power action
